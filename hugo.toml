baseURL = 'https://bigtrust88.github.io/investment-blog/'
languageCode = 'ko-kr'
title = '마켓뷰 - US Stock Market News'
theme = 'PaperMod'
paginate = 10
enableRobotsTXT = true
enableEmoji = true

[outputs]
  home = ['HTML', 'JSON', 'RSS']

[markup]
  [markup.goldmark]
    [markup.goldmark.parser.attribute]
      block = true
      title = true
    [markup.goldmark.renderer]
      hardWraps = false
      unsafe = true

[params]
  homeInfoParams = [
    "마켓뷰 - 중립적 투자 시장 정보 채널",
    "한국과 미국 주식시장의 뉴스, 이슈, 트렌드를 매일 전합니다."
  ]

  author = "MarketView"
  env = "production"

  [params.profileMode]
    enabled = true
    title = "마켓뷰"
    subtitle = "US & KR Stock Market News"
    imageUrl = "/logo.png"
    imageAlt = "MarketView Logo"

  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

  [params.adsense]
    publisher_id = "ca-pub-3811219422484638"

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[taxonomies]
  category = "categories"
  tag = "tags"

[menu]
  [[menu.main]]
    name = "US Market"
    url = "/categories/us-market/"
    weight = 1
  [[menu.main]]
    name = "KR Market"
    url = "/categories/kr-market/"
    weight = 2
  [[menu.main]]
    name = "Archive"
    url = "/archives/"
    weight = 3
